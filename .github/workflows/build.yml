name: Build V2Ray Client Standalone APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Type Check (TypeScript)
        run: npx tsc --noEmit

      - name: Expo Prebuild (Generate Android Project)
        run: npx expo prebuild --platform android --clean

      - name: Inject Native VPN Bridge Package into Generated Project
        run: |
          mkdir -p android/app/src/main/java/com/v2rayclient/app
          mkdir -p android/app/src/main/java/com/v2ray/ang/service
          
          cat << 'EOF' > android/app/src/main/java/com/v2ray/ang/service/TProxyService.java
          package com.v2ray.ang.service;
          public class TProxyService {
              public static native void TProxyStartService(String configPath, int fd);
              public static native void TProxyStopService();
              public static native long[] TProxyGetStats();
              static { System.loadLibrary("hev-socks5-tunnel"); }
          }
          EOF

          cat << 'EOF' > android/app/src/main/java/com/v2rayclient/app/V2RayVpnService.java
          package com.v2rayclient.app;
          import android.content.Intent;
          import android.net.VpnService;
          import android.os.ParcelFileDescriptor;
          import android.util.Log;
          import java.io.File;
          import java.io.FileWriter;
          import com.v2ray.ang.service.TProxyService;

          public class V2RayVpnService extends VpnService {
              private static final String TAG = "V2RayVpnService";
              private ParcelFileDescriptor vpnInterface = null;
              private String configJson = "";

              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  if (intent != null && "STOP".equals(intent.getAction())) {
                      stopVpn();
                      return START_NOT_STICKY;
                  }
                  if (intent != null && intent.hasExtra("configJson")) {
                      configJson = intent.getStringExtra("configJson");
                  }
                  setupVpn();
                  return START_STICKY;
              }

              private void setupVpn() {
                  if (vpnInterface != null) return;
                  try {
                      Builder builder = new Builder();
                      builder.addAddress("10.0.0.2", 24);
                      builder.addRoute("0.0.0.0", 0);
                      builder.setSession("V2RayClient");
                      builder.setMtu(1500);
                      vpnInterface = builder.establish();
                      Log.i(TAG, "VPN Interface established. FD: " + vpnInterface.getFd());

                      File configFile = new File(getCacheDir(), "config.json");
                      FileWriter writer = new FileWriter(configFile);
                      writer.write(configJson);
                      writer.close();
                      final String configPath = configFile.getAbsolutePath();

                      new Thread(new Runnable() {
                          public void run() {
                              try {
                                  String invokeReq = "{\"apiVersion\":1,\"method\":\"runXray\",\"payload\":{\"configPath\":\"" + configPath + "\"}}";
                                  libXray.LibXray.invoke(invokeReq);
                              } catch(Exception e) {
                                  Log.e(TAG, "Xray error", e);
                              }
                          }
                      }).start();

                      String tunYaml = "tunnel:\n  mtu: 1500\n  ipv4: 10.0.0.2\nsocks5:\n  port: 10808\n  address: 127.0.0.1\n  udp: 'udp'\nmisc:\n  tcp-read-write-timeout: 300000\n  udp-read-write-timeout: 60000\n  log-level: warn\n";
                      File tunFile = new File(getCacheDir(), "tun2socks.yaml");
                      FileWriter twriter = new FileWriter(tunFile);
                      twriter.write(tunYaml);
                      twriter.close();
                      
                      TProxyService.TProxyStartService(tunFile.getAbsolutePath(), vpnInterface.getFd());
                      Log.i(TAG, "Tun2Socks started!");
                  } catch (Exception e) {
                      Log.e(TAG, "Failed to establish VPN", e);
                      stopSelf();
                  }
              }

              private void stopVpn() {
                  try { TProxyService.TProxyStopService(); } catch(Exception e){}
                  try {
                      if (vpnInterface != null) { vpnInterface.close(); vpnInterface = null; }
                  } catch (Exception e) { Log.e(TAG, "Failed to close VPN interface", e); }
                  stopSelf();
              }
              @Override public void onDestroy() { stopVpn(); super.onDestroy(); }
          }
          EOF

          cat << 'EOF' > android/app/src/main/java/com/v2rayclient/app/VpnServiceModule.java
          package com.v2rayclient.app;
          import android.content.Intent;
          import android.net.VpnService;
          import android.util.Log;
          import com.facebook.react.bridge.Promise;
          import com.facebook.react.bridge.ReactApplicationContext;
          import com.facebook.react.bridge.ReactContextBaseJavaModule;
          import com.facebook.react.bridge.ReactMethod;
          import com.facebook.react.modules.core.DeviceEventManagerModule;

          public class VpnServiceModule extends ReactContextBaseJavaModule {
              private static final String MODULE_NAME = "VpnServiceModule";
              private final ReactApplicationContext reactContext;
              public VpnServiceModule(ReactApplicationContext reactContext) {
                  super(reactContext);
                  this.reactContext = reactContext;
              }
              @Override public String getName() { return MODULE_NAME; }
              @ReactMethod public void startVpn(String configJson, Promise promise) {
                  try {
                      Intent intent = VpnService.prepare(reactContext);
                      if (intent != null) {
                          intent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                          reactContext.startActivity(intent);
                          promise.resolve(false);
                          return;
                      }
                      Intent startIntent = new Intent(reactContext, V2RayVpnService.class);
                      startIntent.putExtra("configJson", configJson);
                      reactContext.startService(startIntent);
                      emitEvent("onVpnStatusChanged", "CONNECTED");
                      emitEvent("onVpnLogMessage", "[Native VPN] VpnService + Tun2Socks + Xray starting...");
                      promise.resolve(true);
                  } catch (Exception e) { promise.reject("VPN_ERROR", e.getMessage()); }
              }
              @ReactMethod public void stopVpn(Promise promise) {
                  try {
                      Intent stopIntent = new Intent(reactContext, V2RayVpnService.class);
                      stopIntent.setAction("STOP");
                      reactContext.startService(stopIntent);
                      emitEvent("onVpnStatusChanged", "DISCONNECTED");
                      emitEvent("onVpnLogMessage", "[Native VPN] VpnService stopped.");
                      promise.resolve(true);
                  } catch (Exception e) { promise.reject("VPN_ERROR", e.getMessage()); }
              }
              private void emitEvent(String eventName, Object data) {
                  if (reactContext.hasActiveCatalystInstance()) {
                      reactContext.getJSModule(DeviceEventManagerModule.RCTDeviceEventEmitter.class).emit(eventName, data);
                  }
              }
          }
          EOF

          cat << 'EOF' > android/app/src/main/java/com/v2rayclient/app/VpnBridgePackage.java
          package com.v2rayclient.app;
          import com.facebook.react.ReactPackage;
          import com.facebook.react.bridge.NativeModule;
          import com.facebook.react.bridge.ReactApplicationContext;
          import com.facebook.react.uimanager.ViewManager;
          import java.util.ArrayList;
          import java.util.Collections;
          import java.util.List;

          public class VpnBridgePackage implements ReactPackage {
              @Override public List<NativeModule> createNativeModules(ReactApplicationContext reactContext) {
                  List<NativeModule> modules = new ArrayList<>();
                  modules.add(new VpnServiceModule(reactContext));
                  return modules;
              }
              @Override public List<ViewManager> createViewManagers(ReactApplicationContext reactContext) {
                  return Collections.emptyList();
              }
          }
          EOF

          # Inject VpnBridgePackage into MainApplication.kt
          sed -i 's/PackageList(this).packages/PackageList(this).packages.apply { add(VpnBridgePackage()) }/g' android/app/src/main/java/com/v2rayclient/app/MainApplication.kt || true

      - name: Bundle Offline JS Script for Standalone APK
        run: |
          mkdir -p android/app/src/main/assets
          npx expo export:embed --platform android --dev false --entry-file node_modules/expo/AppEntry.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res

      - name: Download and Include VPN Libraries
        run: |
          mkdir -p android/app/libs
          mkdir -p android/app/src/main/jniLibs
          
          # 1. Download libXray
          curl -sL -o /tmp/libxray.zip https://github.com/XTLS/libXray/releases/download/v26.7.11/libxray-android.zip
          unzip -q -o /tmp/libxray.zip -d /tmp/libxray-extracted
          cp /tmp/libxray-extracted/libxray-android/libXray.aar android/app/libs/
          
          # 2. Download v2rayNG to extract tun2socks
          curl -sL -o /tmp/v2rayng.apk https://github.com/2dust/v2rayNG/releases/download/2.2.6/v2rayNG_2.2.6.apk
          unzip -q -o /tmp/v2rayng.apk -d /tmp/v2rayng-extracted
          
          for arch in arm64-v8a armeabi-v7a x86 x86_64; do
            mkdir -p android/app/src/main/jniLibs/$arch
            cp /tmp/v2rayng-extracted/lib/$arch/libhev-socks5-tunnel.so android/app/src/main/jniLibs/$arch/ || true
          done
          
          # Inject dependency into build.gradle
          sed -i 's/dependencies {/dependencies {\n    implementation fileTree(dir: "libs", include: ["*.aar"])\n/g' android/app/build.gradle

      - name: Build Standalone APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload Standalone APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: V2RayClient-standalone-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
